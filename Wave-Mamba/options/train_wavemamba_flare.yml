# ------------------------------------------------------------------------
# Wave-Mamba Flare Removal Training Configuration
# Based on Wave-Mamba (ACMMM2024) adapted for Flare Removal
# ------------------------------------------------------------------------

# General settings
name: WaveMambaFlare
model_type: WaveMambaFlareModel
scale: 1
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: Flare7Kpp
    type: Flare7kpp_Pair_Loader
    # TODO: 修改为你服务器上的数据集路径
    image_path: /path/to/Flickr24K
    scattering_dict:
      Flare7k_scattering: /path/to/Flare7Kpp/Flare7K/Scattering_Flare/Compound_Flare
      Real_scattering1: /path/to/Flare7Kpp/Flare-R/Compound_Flare
    reflective_dict:
      Flare7k_reflective: /path/to/Flare7Kpp/Flare7K/Reflective_Flare
      Real_reflective1: ~
    light_dict:
      Flare7k_light: /path/to/Flare7Kpp/Flare7K/Scattering_Flare/Light_Source
      Real_light1: /path/to/Flare7Kpp/Flare-R/Light_Source
    data_ratio: [0.5, 0.5]  # ratio of synthetic to real flare data
    transform_base:
      img_size: 512
    transform_flare:
      scale_min: 0.8
      scale_max: 1.5
      translate: 300
      shear: 20
    mask_type: ~

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 2
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: flare_test
    type: Image_Pair_Loader
    # TODO: 修改为你服务器上的数据集路径
    dataroot_gt: /path/to/Flare7Kpp/test_data/synthetic/gt
    dataroot_lq: /path/to/Flare7Kpp/test_data/synthetic/input
    gt_size: 512

# network structures
network_g:
  type: WaveMambaFlare  # Registered architecture name
  in_chn: 3
  wf: 32  # feature channel width (original Wave-Mamba size)
  n_l_blocks: [1, 2, 4]  # low-frequency blocks per stage (original)
  n_h_blocks: [1, 1, 2]  # high-frequency blocks per stage (original)
  ffn_scale: 2.0

# path
path:
  pretrain_network_g: ~  # Path to pretrained model if available
  strict_load_g: true
  resume_state: ~

# training settings
train:
  optim_g:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [200000, 400000]
    gamma: 0.5

  total_iter: 600000
  warmup_iter: -1  # no warm up

  # Losses for flare removal
  # 1. Flare prediction loss: L1(flare_pred, gt_flare)
  flare_l1_opt:
    type: L_Abs_pure
    loss_weight: 1.0

  # 2. Perceptual loss on clean image
  perceptual_opt:
    type: L_percepture
    loss_weight: 0.5

  # 3. FFT loss for frequency consistency (optional)
  fft_opt:
    type: FFTLoss
    loss_weight: 0.1

# validation settings
val:
  val_freq: !!float 5e3
  save_img: true

  metrics:
    psnr:
      type: psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: ssim
      crop_border: 0
      test_y_channel: false
    lpips:
      type: lpips
      better: lower

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  save_latest_freq: !!float 5e3
  show_tf_imgs_freq: 1000
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
